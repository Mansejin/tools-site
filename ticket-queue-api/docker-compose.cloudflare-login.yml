# Cloudflare Tunnel via cloudflared login credentials (browser OAuth once).
# Prefer this when CLOUDFLARE_API_TOKEN is not available.
#
#   sh scripts/login-and-provision-cloudflare-tunnel.sh
#   docker compose -f docker-compose.yml -f docker-compose.cloudflare-login.yml up -d
#
# Requires ./cloudflared/config.yml + ./cloudflared/credentials.json on the NAS.

services:
  api:
    networks:
      - tq-net

  redis:
    networks:
      - tq-net

  cloudflared:
    # Synology ACL mounts are often unreadable by the image nonroot user
    user: "0:0"
    image: cloudflare/cloudflared:latest
    container_name: ticket-queue-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ./cloudflared/credentials.json:/etc/cloudflared/credentials.json:ro
    depends_on:
      - api
    networks:
      - tq-net

networks:
  tq-net:
    driver: bridge
