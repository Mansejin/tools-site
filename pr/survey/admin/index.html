<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <script>
    (function () {
      var s = localStorage.getItem("mansejin-theme");
      var d = s === "dark" || (s !== "light" && matchMedia("(prefers-color-scheme: dark)").matches);
      document.documentElement.setAttribute("data-theme", d ? "dark" : "light");
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>만족도 조사 · 관리</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../../css/course.css?v=20260712">
  <link rel="stylesheet" href="../../admin/css/admin.css?v=20260712">
  <link rel="stylesheet" href="../css/survey.css?v=20260712">
</head>
<body data-survey-endpoint="https://script.google.com/macros/s/AKfycbz-LU3JWJCNOT3R0-Fr-3iGmKpwC8gb80k4sWuMufBJM3oz9zV0Q-rWTOEWya3RQEEW/exec">

  <div class="admin-page" id="surveyAdminApp">
    <p class="admin-loading">불러오는 중…</p>
  </div>

  <style>
    .survey-response-list { display: flex; flex-direction: column; gap: 12px; }
    .survey-response-head {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 12px; margin-bottom: 12px; flex-wrap: wrap;
      font-size: 0.88rem;
    }
    .survey-response-head time { color: var(--text-tertiary); font-size: 0.8rem; white-space: nowrap; }
    .survey-response-dl {
      display: grid; grid-template-columns: 120px 1fr; gap: 6px 12px; font-size: 0.85rem;
    }
    .survey-response-dl dt { color: var(--text-tertiary); font-weight: 500; }
    .survey-response-dl dd { color: var(--text); word-break: break-word; }
    @media (max-width: 480px) {
      .survey-response-dl { grid-template-columns: 1fr; }
      .survey-response-dl dt { margin-top: 4px; }
    }
  </style>

  <script src="js/admin.js?v=20260712"></script>
  <script src="../../../js/theme.js"></script>
</body>
</html>
