services:
  redis:
    image: redis:7-alpine
    container_name: ticket-queue-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    container_name: ticket-queue-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Host 8787 is used by saenggibu-gateway on this NAS — default 8790 for deploy.
      - "${TICKET_QUEUE_HOST_PORT:-8790}:8787"
    environment:
      PORT: "8787"
      REDIS_URL: redis://redis:6379
      EVENT_ID: ${EVENT_ID:-demo}
      SEATS_TOTAL: ${SEATS_TOTAL:-200}
      ADMIT_PER_SEC: ${ADMIT_PER_SEC:-40}
      ACTIVE_TTL_SEC: ${ACTIVE_TTL_SEC:-180}
      MAX_QUEUE: ${MAX_QUEUE:-5000}
      DATA_DIR: /app/data
    volumes:
      - ticket_queue_data:/app/data
    depends_on:
      redis:
        condition: service_healthy

volumes:
  ticket_queue_data:
