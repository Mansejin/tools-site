<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <script>
    (function () {
      var s = localStorage.getItem("mansejin-theme");
      var d = s === "dark" || (s !== "light" && matchMedia("(prefers-color-scheme: dark)").matches);
      document.documentElement.setAttribute("data-theme", d ? "dark" : "light");
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>장난감 · 만세진</title>
  <meta name="description" content="쓸 데 없는 게 필요하면 눌러보세요.">
  <meta property="og:url" content="https://mansejin.com/toys/">
  <link rel="canonical" href="https://mansejin.com/toys/">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <script>
    (function () {
      var q = location.search;
      var p = new URLSearchParams(q);
      if (p.get('e')) { location.replace('excuse/' + q); return; }
      var app = p.get('app');
      if (app === 'excuse' || app === 'hair' || app === 'poker' || app === 'coupon' || app === 'ticket-queue') {
        location.replace(app + '/' + q);
      }
    })();
  </script>
</head>
<body>
  <div class="page">
    <header class="site-header">
      <div class="header-top">
        <a class="back-link" href="../">← 도구함</a>
        <div class="header-actions">
          <label class="theme-switch">
            <input type="checkbox" class="theme-switch-input" role="switch">
            <span class="theme-switch-track">
              <span class="theme-switch-thumb"></span>
            </span>
          </label>
          <a class="github-link" href="https://github.com/Mansejin" target="_blank" rel="noopener noreferrer">GitHub</a>
        </div>
      </div>
      <p class="hero-emoji">🎲</p>
      <h1>장난감</h1>
      <p class="subtitle toys-subtitle">쓸 데 없는 게 필요하면 눌러보세요.<br>진지하게 쓰지 마세요.</p>
    </header>

    <nav class="toys-grid" aria-label="장난감 목록">
      <a class="toys-card" href="excuse/">
        <span class="toys-card-emoji">🏃‍♂️</span>
        <span class="toys-card-title">지각 핑계 생성기</span>
        <span class="toys-card-desc">늦었을 때 그럴듯한 핑계가 필요하면</span>
      </a>
      <a class="toys-card" href="hair/">
        <span class="toys-card-emoji">🧑‍🦲</span>
        <span class="toys-card-title">탈모 확률 계산기</span>
        <span class="toys-card-desc">과학적 알고리즘으로 정밀 분석 (진짜임)</span>
      </a>
      <a class="toys-card" href="poker/">
        <span class="toys-card-emoji">🃏</span>
        <span class="toys-card-title">콜 할까 말까?</span>
        <span class="toys-card-desc">홀덤 톡방 의사결정 도우미 (책임 안 짐)</span>
      </a>
      <a class="toys-card" href="coupon/">
        <span class="toys-card-emoji">💕</span>
        <span class="toys-card-title">커플 쿠폰 뽑기</span>
        <span class="toys-card-desc">남친·여친 이용권 쿠폰팩! 레어카드도 숨어있어</span>
      </a>
      <a class="toys-card" href="ticket-queue/">
        <span class="toys-card-emoji">🚄</span>
        <span class="toys-card-title">명절 예매 대기열</span>
        <span class="toys-card-desc">수백만 줄서기·순번·좌석 차감을 브라우저로 체험</span>
      </a>
    </nav>

    <footer class="site-footer">
      <p><a href="../">도구함</a> · <a href="mailto:sae3648@gmail.com">버그 신고</a></p>
    </footer>
  </div>
  <script src="../js/theme.js"></script>
</body>
</html>
